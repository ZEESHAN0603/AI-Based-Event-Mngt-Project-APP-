<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Expense - Event Vendor App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#221a7f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131220",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom styles for select arrow since we avoid external SVGs in config where possible for reliability */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark overflow-x-hidden shadow-2xl">
<!-- TopAppBar Header -->
<header class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-primary/20">
<button aria-label="Go back" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 ml-2">New Expense</h2>
<div class="size-12"></div> <!-- Spacer for symmetry -->
</header>
<!-- Scrollable Form Content -->
<main class="flex-1 overflow-y-auto pb-32">
<!-- Expense Title -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3 mt-4">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Expense Title</p>
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base" placeholder="e.g. Venue Rental" type="text" value=""/>
</label>
</div>
<!-- Category -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Category</p>
<select class="form-select flex w-full min-w-0 flex-1 rounded-xl border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary h-14 p-4 text-base">
<option disabled="" selected="" value="">Select category</option>
<option value="equipment">Equipment</option>
<option value="venue">Venue</option>
<option value="catering">Catering</option>
<option value="marketing">Marketing</option>
<option value="travel">Travel</option>
</select>
</label>
</div>
<!-- Amount -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Amount</p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400">$</span>
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary h-14 pl-8 p-4 text-base" placeholder="0.00" step="0.01" type="number"/>
</div>
</label>
</div>
<!-- Vendor Name with Search -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Vendor Name</p>
<div class="flex w-full flex-1 items-stretch rounded-xl shadow-sm">
<input class="form-input flex w-full min-w-0 flex-1 rounded-l-xl border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-white focus:outline-0 focus:ring-0 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 border-r-0 text-base" placeholder="Select vendor from list..."/>
<div class="text-slate-500 dark:text-slate-400 flex border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/20 items-center justify-center px-4 rounded-r-xl border-l-0 cursor-pointer">
<span class="material-symbols-outlined">arrow_drop_down</span>
</div>
</div><div class="flex justify-between items-center mt-2 px-1"><span class="text-xs text-slate-500 dark:text-slate-400">Choose from your saved vendors</span><button class="text-xs font-semibold text-primary dark:text-blue-400 hover:underline flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">list</span>Browse All</button></div>
</label>
</div>
<!-- Date Picker -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Expense Date</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary h-14 p-4 text-base" type="date" value="2023-10-27"/>
</div>
</label>
</div>
<!-- Payment Method -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Payment Method</p>
<select class="form-select flex w-full min-w-0 flex-1 rounded-xl border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary h-14 p-4 text-base">
<option value="credit_card">Credit Card</option>
<option value="bank_transfer">Bank Transfer</option>
<option value="cash">Cash</option>
<option value="check">Check</option>
</select>
</label>
</div>
<!-- Notes -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-2">Notes</p>
<textarea class="form-textarea flex w-full min-w-0 flex-1 rounded-xl border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary min-h-[100px] placeholder:text-slate-400 dark:placeholder:text-slate-500 p-4 text-base resize-none" placeholder="Add additional details..."></textarea>
</label>
</div>
</main>
<!-- Bottom Primary Button -->
<footer class="fixed bottom-0 w-full max-w-md p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-primary/20">
<button class="w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_circle</span>
                Add Expense
            </button>
<!-- Safe area spacer for mobile notches -->
<div class="h-4"></div>
</footer>
</div>
</body></html>
