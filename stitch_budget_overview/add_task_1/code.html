<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Task - Event Vendor App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#221a7f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input[type="radio"]:checked + label {
            background-color: #221a7f;
            color: white;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen">
<div class="relative mx-auto max-w-md flex flex-col min-h-screen bg-background-light dark:bg-background-dark shadow-2xl">
<header class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 border-b border-primary/10">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="ml-2 text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Create New Task</h1>
</header>
<main class="flex-1 px-4 py-6 space-y-6 overflow-y-auto pb-32">
<section class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Task Title</label>
<input class="w-full h-14 rounded-xl border-primary/20 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none px-4 transition-all" placeholder="e.g., Finalize Catering Menu" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Category</label>
<div class="relative">
<select class="w-full h-14 appearance-none rounded-xl border-primary/20 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none px-4 transition-all">
<option value="">Select category</option>
<option value="catering">Catering</option>
<option value="decor">Decor &amp; Design</option>
<option value="logistics">Logistics</option>
<option value="entertainment">Entertainment</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Deadline</label>
<div class="relative group">
<input class="w-full h-14 rounded-xl border-primary/20 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none px-4 pr-12 transition-all" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-primary">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Priority</label>
<div class="flex p-1 bg-primary/5 dark:bg-primary/20 rounded-xl gap-1">
<div class="flex-1">
<input checked="" class="hidden" id="low" name="priority" type="radio"/>
<label class="flex items-center justify-center h-10 rounded-lg cursor-pointer text-sm font-medium text-slate-600 dark:text-slate-400 transition-all" for="low">Low</label>
</div>
<div class="flex-1">
<input class="hidden" id="med" name="priority" type="radio"/>
<label class="flex items-center justify-center h-10 rounded-lg cursor-pointer text-sm font-medium text-slate-600 dark:text-slate-400 transition-all" for="med">Medium</label>
</div>
<div class="flex-1">
<input class="hidden" id="high" name="priority" type="radio"/>
<label class="flex items-center justify-center h-10 rounded-lg cursor-pointer text-sm font-medium text-slate-600 dark:text-slate-400 transition-all" for="high">High</label>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Assign Vendor</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full h-14 rounded-xl border-primary/20 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none pl-12 pr-4 transition-all" placeholder="Search vendor name..." type="text"/>
</div>
<div class="flex gap-2 mt-2 overflow-x-auto pb-2 no-scrollbar">
<div class="flex items-center gap-2 bg-primary/10 dark:bg-primary/30 py-1.5 px-3 rounded-full shrink-0">
<img alt="Alice" class="w-6 h-6 rounded-full" data-alt="Small profile avatar of a vendor" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9BzXdKY7FrSuVFSpPd7qPd3Nqmly1Fu9q6hHABnMCjx0K6Yxwqm2rYGANpepvxoA6WCzz-FVQBM7NzltaX-V5xK29IoHumqCQBlCVN8sI-obtcXVDJwHY77WFrJD_SxcB4XaPZ2ayyabOqIZtFxcv7kl38g9-eUis8yihbhbuzlxAHhlb38w6QQESAclWgY7AzK1pFnbiVLimcS2d5Uc2HpLBYw88Axvmg7gqdVMmmjfCDj692xUU4baJO_SsbXkPj8xZTzJdzud_"/>
<span class="text-xs font-medium">Alice Catering</span>
<span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</div>
<div class="flex items-center gap-2 bg-primary/10 dark:bg-primary/30 py-1.5 px-3 rounded-full shrink-0">
<img alt="Bob" class="w-6 h-6 rounded-full" data-alt="Small profile avatar of a vendor" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvyTzHc-fZnKTO36m9WSUwLmc3RwF91rZh4oEv1WkArxaxRSiIOowYymfY-tF7z31qjcThUAlkEIoFM98eFsiQKD7e71YfrwotHJKHFb4NBaQsmp_BZmPqRBgwOFF6ptmutS923stDK3nlMt8UE5SOeZRVhOl4Hnp1YpmoBtXLsie2ALlQ7hXtjw2NRdfDE7oifZTlHRsyIj_55fgCkzpkkEbbG1nczOJcDZEuvjoDXBlGkIurhJ3zX6CK-2ETpImoQcxk22DJ7AGB"/>
<span class="text-xs font-medium">Stage Pros</span>
<span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Notes</label>
<textarea class="w-full rounded-xl border-primary/20 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none p-4 transition-all resize-none" placeholder="Additional details about the task..." rows="4"></textarea>
</div>
</section>
</main>
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark pt-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_task</span>
                Add Task
            </button>
</div>
</div>
</body></html>
