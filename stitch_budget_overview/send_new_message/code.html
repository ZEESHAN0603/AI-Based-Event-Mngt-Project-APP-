<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Send New Message - Event Planner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#221a7f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131220",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background-light dark:bg-background-dark shadow-xl">
<!-- TopAppBar -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-primary/20">
<div class="flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-slate-200 dark:hover:bg-primary/20 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-2">Send New Message</h2>
<button class="text-primary dark:text-primary p-2">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Channel Selection Tabs -->
<div class="px-4">
<div class="flex border-b border-slate-200 dark:border-primary/20 gap-8">
<a class="flex flex-col items-center justify-center border-b-[3px] border-primary text-primary pb-3 pt-4" href="#">
<p class="text-sm font-bold tracking-wide">Email</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4" href="#">
<p class="text-sm font-medium tracking-wide">SMS</p>
</a>
<a class="flex flex-col items-center justify-center border-b-[3px] border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-4" href="#">
<p class="text-sm font-medium tracking-wide">WhatsApp</p>
</a>
</div>
</div>
</header>
<main class="flex-1 overflow-y-auto p-4 space-y-6">
<!-- Recipient Selection Section -->
<section class="space-y-3">
<div class="flex items-center justify-between">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Recipients</label>
<button class="text-primary text-xs font-bold hover:underline">Select All</button>
</div>
<div class="relative">
<select class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-primary/30 bg-white dark:bg-primary/10 h-14 appearance-none px-4 py-2 text-base">
<option value="">Search or select guests</option>
<option value="all">All Attendees (120)</option>
<option value="vip">VIPs Only (12)</option>
<option value="speakers">Speakers (5)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 pointer-events-none text-slate-400">expand_more</span>
</div>
<!-- Quick Filter Chips -->
<div class="flex gap-2 flex-wrap pt-1">
<div class="flex items-center gap-1.5 rounded-full bg-primary text-white px-3 py-1.5 text-xs font-medium">
<span>VIP Guests</span>
<span class="material-symbols-outlined text-sm cursor-pointer">close</span>
</div>
<div class="flex items-center gap-1.5 rounded-full bg-slate-200 dark:bg-primary/20 text-slate-700 dark:text-slate-300 px-3 py-1.5 text-xs font-medium">
<span class="material-symbols-outlined text-sm">groups</span>
<span>Filter by Group</span>
</div>
</div>
</section>
<!-- Subject Line (Specific to Email) -->
<section class="space-y-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Subject</label>
<input class="w-full rounded-lg border border-slate-200 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="Enter message subject..." type="text"/>
</section>
<!-- Message Body -->
<section class="space-y-2 flex-1 flex flex-col">
<div class="flex items-center justify-between">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Message Content</label>
<button class="flex items-center gap-1 text-primary text-xs font-bold bg-primary/10 px-3 py-1 rounded-full border border-primary/20 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-sm">description</span>
                        Insert Template
                    </button>
</div>
<textarea class="w-full min-h-[200px] flex-1 rounded-lg border border-slate-200 dark:border-primary/30 bg-white dark:bg-primary/10 text-slate-900 dark:text-slate-100 px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 resize-none" placeholder="Write your message here..."></textarea>
<!-- Editor Toolbar Mock -->
<div class="flex items-center gap-4 px-2 py-1 text-slate-400">
<button class="hover:text-primary"><span class="material-symbols-outlined">format_bold</span></button>
<button class="hover:text-primary"><span class="material-symbols-outlined">format_italic</span></button>
<button class="hover:text-primary"><span class="material-symbols-outlined">link</span></button>
<button class="hover:text-primary"><span class="material-symbols-outlined">attach_file</span></button>
<div class="ml-auto text-[10px] font-mono opacity-50 uppercase tracking-widest">
                        Markdown Supported
                    </div>
</div>
</section>
</main>
<!-- Fixed Footer Action -->
<footer class="p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-primary/20">
<div class="flex gap-3">
<button class="flex-1 py-4 px-6 rounded-xl border border-slate-200 dark:border-primary/30 text-slate-700 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-primary/10 transition-colors">
                    Save Draft
                </button>
<button class="flex-[2] py-4 px-6 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
                    Send Message
                </button>
</div>
<p class="text-center text-[10px] text-slate-400 mt-3 font-medium">Estimated delivery to 12 recipients</p>
</footer>
</div>
</body></html>
