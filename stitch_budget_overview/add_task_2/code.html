<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Planzo - Add Task</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#221a7f",
                        "background-light": "#f6f6f8",
                        "background-dark": "#131220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom styles for select arrow and date picker to match theme */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-2xl mx-auto flex flex-col min-h-screen">
<!-- Top Navigation -->
<header class="flex items-center p-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10 border-b border-slate-200 dark:border-slate-800">
<button class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-xl font-bold tracking-tight">Add Task</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 p-6 space-y-6">
<!-- Task Title Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="task-title">Task Title</label>
<input class="w-full h-14 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" id="task-title" placeholder="e.g., Book Venue Catering" type="text"/>
</div>
<!-- Category and Deadline Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="category">Category</label>
<select class="w-full h-14 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="category">
<option disabled="" selected="" value="">Select category</option>
<option value="logistics">Logistics</option>
<option value="catering">Catering</option>
<option value="entertainment">Entertainment</option>
<option value="marketing">Marketing</option>
</select>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="deadline">Deadline</label>
<div class="relative">
<input class="w-full h-14 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 pr-12 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="deadline" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">calendar_month</span>
</div>
</div>
</div>
<!-- Priority Selector -->
<div class="space-y-3">
<span class="block text-sm font-medium text-slate-700 dark:text-slate-300 text-center">Priority Level</span>
<div class="flex p-1 bg-slate-100 dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800">
<label class="flex-1 cursor-pointer">
<input class="sr-only peer" name="priority" type="radio" value="low"/>
<div class="py-3 text-center rounded-lg peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:shadow-sm transition-all text-slate-500 peer-checked:text-emerald-500 font-semibold">
                            Low
                        </div>
</label>
<label class="flex-1 cursor-pointer">
<input checked="" class="sr-only peer" name="priority" type="radio" value="medium"/>
<div class="py-3 text-center rounded-lg peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:shadow-sm transition-all text-slate-500 peer-checked:text-amber-500 font-semibold">
                            Medium
                        </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="sr-only peer" name="priority" type="radio" value="high"/>
<div class="py-3 text-center rounded-lg peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:shadow-sm transition-all text-slate-500 peer-checked:text-rose-500 font-semibold">
                            High
                        </div>
</label>
</div>
</div>
<!-- Vendor Assignment -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="vendor">Assign Vendor</label>
<div class="relative">
<select class="w-full h-14 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" id="vendor">
<option disabled="" selected="" value="">Search for vendor</option>
<option value="1">Global Events Co.</option>
<option value="2">Delicious Bites Catering</option>
<option value="3">TechSound Solutions</option>
</select>
</div>
</div>
<!-- Notes Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="notes">Notes &amp; Description</label>
<textarea class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none placeholder:text-slate-400 dark:placeholder:text-slate-600" id="notes" placeholder="Add specific instructions or details about the task..." rows="4"></textarea>
</div>
</main>
<!-- Fixed Footer Action -->
<footer class="p-6 pb-10 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 mt-auto">
<button class="w-full bg-primary hover:opacity-90 text-white font-bold h-14 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">add_task</span>
                Add Task to Planzo
            </button>
</footer>
</div>
</body></html>
